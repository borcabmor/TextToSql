name: CD
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build imagen
        run: |
          docker build \
            -f Dockerfile.api \
            -t ghcr.io/${{ github.repository_owner }}/text-to-sql-api:latest \
            .

      - name: Push imagen
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/text-to-sql-api:latest

      - name: Trigger Render Deploy
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}