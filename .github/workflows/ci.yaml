name: CI
on:
  push:
    branches: ["master"]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Configurar PYTHONPATH
      run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

    - name: Instalar uv
      run: pip install uv

    - name: Instalar dependencias
      run: uv sync --frozen

    - name: Ejecutar tests de datos
      run: uv run pytest tests/test_data.py

    - name: Ejecutar tests unitarios
      run: uv run pytest tests/test_unit.py

    - name: Ejecutar tests de API
      run: uv run pytest tests/test_inference.py
      
    - name: Construir la imagen
      run: |
        echo "Construyendo la imagen"
        docker build -f Dockerfile.api -t text_to_sql_api_v1:test .